<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish — EATURKISH</title>
  <link rel="stylesheet" href="/static/frontend/globals.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-bg-light) 0%, #f0f0f0 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--color-white);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-card__logo {
      font-size: 32px;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .login-card__sub {
      font-size: 14px;
      color: var(--color-text-gray);
      margin-bottom: 10px;
    }
    .login-card__divider {
      width: 50px;
      height: 3px;
      background: var(--color-primary);
      border-radius: 3px;
      margin: 0 auto 28px;
    }
    .login-card .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .login-card .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-dark);
      margin-bottom: 6px;
    }
    .login-card .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--color-border);
      border-radius: 12px;
      font-family: var(--font-family);
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
      background: var(--color-bg-light);
    }
    .login-card .form-group input:focus {
      border-color: var(--color-primary);
      background: var(--color-white);
      box-shadow: 0 0 0 3px rgba(185, 28, 60, 0.1);
    }
    .login-card .form-group input::placeholder {
      color: #aaa;
    }
    .login-card__btn {
      width: 100%;
      padding: 14px;
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: 12px;
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .login-card__btn:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(185, 28, 60, 0.3);
    }
    .login-card__btn:active {
      transform: translateY(0);
    }
    .login-card__btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .login-card__error {
      color: var(--color-primary);
      font-size: 13px;
      margin-top: 14px;
      display: none;
      background: #fef2f2;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #fecaca;
    }
    .login-card__error--visible {
      display: block;
    }
    .login-card__footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--color-border);
    }
    .login-card__link {
      font-size: 13px;
      color: var(--color-text-gray);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-card__link:hover {
      color: var(--color-primary);
    }
    .login-card__link strong {
      color: var(--color-primary);
      font-weight: 700;
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 20px; border-radius: 16px; }
      .login-card__logo { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">EATURKISH</div>
      <p class="login-card__sub">Akuntingizga kirish</p>
      <div class="login-card__divider"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Parol</label>
          <input type="password" id="password" placeholder="Parol" required autocomplete="current-password" />
        </div>

        <p class="login-card__error" id="loginError"></p>

        <button type="submit" class="login-card__btn" id="loginBtn">
          <span id="btnText">Kirish</span>
          <span id="btnSpinner" style="display:none;">⏳</span>
        </button>
      </form>

      <div class="login-card__footer">
        <a href="/register/" class="login-card__link">
          Akuntingiz yo'qmi? <strong>Ro'yxatdan o'tish</strong>
        </a>
        <br />
        <a href="/" class="login-card__link" style="display:inline-block;margin-top:10px;">
          &larr; Bosh sahifaga qaytish
        </a>
      </div>
    </div>
  </div>

  <script src="/static/frontend/api.js"></script>
  <script>
    (function () {
      var currentUser = getUser();
      if (currentUser && getToken()) {
        if (currentUser.role === 'admin') {
          window.location.href = 'admin-panel.html';
        } else {
          window.location.href = 'profile.html';
        }
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');
      var btnText = document.getElementById('btnText');
      var btnSpinner = document.getElementById('btnSpinner');
      errorEl.classList.remove('login-card__error--visible');

      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      if (!username || !password) {
        errorEl.textContent = 'Username va parolni kiriting.';
        errorEl.classList.add('login-card__error--visible');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Kirish...';
      btnSpinner.style.display = 'inline';

      try {
        var data = await apiPost('/accounts/auth/login', {
          username: username,
          password: password
        });
        setTokens(data.access, data.refresh);
        setUser(data.user);
        if (data.user && data.user.role === 'admin') {
          window.location.href = 'admin-panel.html';
        } else {
          window.location.href = 'profile.html';
        }
      } catch (err) {
        btn.disabled = false;
        btnText.textContent = 'Kirish';
        btnSpinner.style.display = 'none';

        if (err && err.json) {
          err.json().then(function (errData) {
            errorEl.textContent = errData.detail || 'Username yoki parol noto\'g\'ri';
            errorEl.classList.add('login-card__error--visible');
          }).catch(function () {
            errorEl.textContent = 'Username yoki parol noto\'g\'ri';
            errorEl.classList.add('login-card__error--visible');
          });
        } else {
          errorEl.textContent = err.message || 'Username yoki parol noto\'g\'ri';
          errorEl.classList.add('login-card__error--visible');
        }
      }
    });
  </script>
</body>
</html>
