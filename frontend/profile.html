<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilim — Restaran</title>
  <link rel="stylesheet" href="/static/frontend/globals.css" />
  <style>
    .profile-page { min-height: 100vh; background: var(--color-bg-light); padding: 40px 20px; }
    .profile-wrap { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
    .profile-card {
      background: var(--color-white); border-radius: 20px; padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .profile-card__title {
      font-size: 22px; font-weight: 800; color: var(--color-text-dark);
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--color-bg-light);
    }
    .profile-avatar-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      background: var(--color-bg-light);
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--color-primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700;
    }
    .profile-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--color-border); }
    .profile-row__label { font-size: 14px; color: var(--color-text-gray); font-weight: 600; }
    .profile-row__value { font-size: 14px; color: var(--color-text-dark); }
    .profile-badge { display: inline-block; padding: 4px 12px; background: var(--color-primary); color: #fff; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .profile-actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      padding: 12px 20px; border: none; border-radius: 10px; font-family: var(--font-family);
      font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 6px;
    }
    .btn--primary { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { background: var(--color-primary-dark); }
    .btn--ghost { background: var(--color-bg-light); color: var(--color-text-dark); border: 1px solid var(--color-border); }
    .btn--ghost:hover { background: #e5e7eb; }
    .btn--danger { background: #dc2626; color: #fff; }
    .btn--danger:hover { background: #b91c1c; }
    .btn--sm { padding: 8px 14px; font-size: 13px; }
    .profile-error { color: var(--color-primary); font-size: 13px; margin-top: 8px; }
    .profile-success { color: #16a34a; font-size: 13px; margin-top: 8px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--color-text-dark); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--color-border); border-radius: 10px; font-family: var(--font-family); font-size: 14px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .form-group input:focus { border-color: var(--color-primary); }
    .hidden { display: none; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: var(--color-bg-light); border-radius: 12px; padding: 4px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-family: var(--font-family); font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--color-text-gray); transition: all 0.2s; }
    .tab-btn--active { background: var(--color-white); color: var(--color-text-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .order-item { padding: 12px 0; border-bottom: 1px solid var(--color-border); }
    .order-item:last-child { border-bottom: none; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .order-id { font-weight: 700; font-size: 14px; }
    .order-status { font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .order-status--pending { background: #fef3c7; color: #92400e; }
    .order-status--processing { background: #dbeafe; color: #1e40af; }
    .order-status--completed { background: #dcfce7; color: #166534; }
    .order-status--cancelled { background: #fee2e2; color: #991b1b; }
    .order-total { font-size: 14px; font-weight: 700; color: var(--color-primary); }
    .order-date { font-size: 12px; color: var(--color-text-gray); }
    .order-products { font-size: 13px; color: var(--color-text-gray); margin-top: 4px; }
    .file-input-wrap { position: relative; }
    .file-input-wrap input[type="file"] { opacity: 0; position: absolute; inset: 0; cursor: pointer; }
  </style>
</head>
<body>
  <div class="profile-page">
    <div class="profile-wrap">
      <div class="profile-card">
        <div class="profile-avatar-wrap">
          <div id="avatarContainer">
            <img id="avatarImg" class="profile-avatar hidden" alt="Avatar" />
            <div id="avatarPlaceholder" class="profile-avatar-placeholder" style="display:flex">?</div>
          </div>
          <div>
            <h1 class="profile-card__title" style="border:none; margin-bottom:4px; padding-bottom:0;" id="displayName">Profilim</h1>
            <p class="profile-row__value" id="displayRole" style="font-size:13px;"></p>
          </div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn tab-btn--active" data-tab="view">Ko'rish</button>
          <button class="tab-btn" data-tab="edit">Tahrirlash</button>
          <button class="tab-btn" data-tab="password">Parol</button>
          <button class="tab-btn" data-tab="orders">Buyurtmalar</button>
        </div>

        <!-- View Tab -->
        <div id="tabView">
          <div class="profile-row"><span class="profile-row__label">ID</span><span class="profile-row__value" id="f-id">—</span></div>
          <div class="profile-row"><span class="profile-row__label">Username</span><span class="profile-row__value" id="f-username">—</span></div>
          <div class="profile-row"><span class="profile-row__label">Email</span><span class="profile-row__value" id="f-email">—</span></div>
          <div class="profile-row"><span class="profile-row__label">Telefon</span><span class="profile-row__value" id="f-phone">—</span></div>
          <div class="profile-row"><span class="profile-row__label">Rol</span><span class="profile-row__value" id="f-role">—</span></div>
          <div class="profile-row"><span class="profile-row__label">Ro'yxatdan o'tgan</span><span class="profile-row__value" id="f-joined">—</span></div>
        </div>

        <!-- Edit Tab -->
        <div id="tabEdit" class="hidden">
          <form id="editForm">
            <div class="form-group">
              <label>Avatar</label>
              <div class="file-input-wrap">
                <input type="file" id="avatarInput" accept="image/*" />
                <button type="button" class="btn btn--ghost btn--sm">Rasm tanlash</button>
              </div>
            </div>
            <div class="form-group">
              <label for="editUsername">Username</label>
              <input type="text" id="editUsername" required />
            </div>
            <div class="form-group">
              <label for="editEmail">Email</label>
              <input type="email" id="editEmail" />
            </div>
            <div class="form-group">
              <label for="editPhone">Telefon</label>
              <input type="text" id="editPhone" />
            </div>
            <p class="profile-error" id="editError"></p>
            <p class="profile-success" id="editSuccess"></p>
            <button type="submit" class="btn btn--primary">Saqlash</button>
          </form>
        </div>

        <!-- Password Tab -->
        <div id="tabPassword" class="hidden">
          <form id="passwordForm">
            <div class="form-group">
              <label for="oldPassword">Eski parol</label>
              <input type="password" id="oldPassword" required />
            </div>
            <div class="form-group">
              <label for="newPassword">Yangi parol</label>
              <input type="password" id="newPassword" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Yangi parol (takror)</label>
              <input type="password" id="confirmPassword" required />
            </div>
            <p class="profile-error" id="passwordError"></p>
            <p class="profile-success" id="passwordSuccess"></p>
            <button type="submit" class="btn btn--primary">Parolni o'zgartirish</button>
          </form>
        </div>

        <!-- Orders Tab -->
        <div id="tabOrders" class="hidden">
          <div id="ordersList"></div>
          <p class="profile-error" id="ordersError"></p>
          <p class="profile-success" id="ordersEmpty" class="hidden">Hali buyurtmalar yo'q.</p>
        </div>

        <div class="profile-actions">
          <a href="/" class="btn btn--ghost">&larr; Bas panel</a>
          <button class="btn btn--danger" id="logoutBtn">Chiqish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/frontend/api.js"></script>
  <script>
    (function () {
      var currentUser = getUser();
      if (!currentUser || !getToken()) {
        window.location.href = 'login.html';
        return;
      }
      loadProfile();
    })();

    async function loadProfile() {
      try {
        var me = await apiGet('/accounts/auth/me');
        setUser(me);
        renderProfile(me);
      } catch (err) {
        document.getElementById('profileError').textContent = 'Profilni yuklab bo\'lmadi. Qayta kiring.';
      }
    }

    function renderProfile(me) {
      document.getElementById('displayName').textContent = me.username;
      document.getElementById('displayRole').innerHTML = '<span class="profile-badge">' + (me.role || 'user') + '</span>';
      document.getElementById('f-id').textContent = me.id;
      document.getElementById('f-username').textContent = me.username;
      document.getElementById('f-email').textContent = me.email || '—';
      document.getElementById('f-phone').textContent = me.phone || '—';
      document.getElementById('f-role').innerHTML = '<span class="profile-badge">' + (me.role || 'user') + '</span>';
      document.getElementById('f-joined').textContent = me.date_joined ? new Date(me.date_joined).toLocaleDateString('uz-UZ') : '—';

      document.getElementById('editUsername').value = me.username;
      document.getElementById('editEmail').value = me.email || '';
      document.getElementById('editPhone').value = me.phone || '';

      if (me.avatar) {
        var img = document.getElementById('avatarImg');
        img.src = me.avatar;
        img.classList.remove('hidden');
        document.getElementById('avatarPlaceholder').style.display = 'none';
      } else {
        document.getElementById('avatarPlaceholder').textContent = me.username.charAt(0).toUpperCase();
        document.getElementById('avatarPlaceholder').style.display = 'flex';
        document.getElementById('avatarImg').classList.add('hidden');
      }
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('tab-btn--active'); });
        btn.classList.add('tab-btn--active');
        document.querySelectorAll('[id^="tab"]').forEach(function(t) { t.classList.add('hidden'); });
        var tabId = 'tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1);
        document.getElementById(tabId).classList.remove('hidden');
        if (btn.dataset.tab === 'orders') loadOrders();
      });
    });

    // Edit profile
    document.getElementById('editForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('editError');
      var successEl = document.getElementById('editSuccess');
      errorEl.textContent = '';
      successEl.textContent = '';

      var formData = new FormData();
      formData.append('username', document.getElementById('editUsername').value);
      formData.append('email', document.getElementById('editEmail').value);
      formData.append('phone', document.getElementById('editPhone').value);
      var avatarFile = document.getElementById('avatarInput').files[0];
      if (avatarFile) formData.append('avatar', avatarFile);

      try {
        var result = await apiPatchFormData('/accounts/auth/me/update', formData);
        successEl.textContent = 'Profil saqlandi!';
        renderProfile(result);
      } catch (err) {
        if (err && err.json) {
          err.json().then(function(d) {
            var msgs = [];
            for (var k in d) { msgs.push((d[k] && d[k].join) ? d[k].join(', ') : String(d[k])); }
            errorEl.textContent = msgs.join(' | ');
          }).catch(function() {
            errorEl.textContent = 'Xatolik yuz berdi.';
          });
        } else {
          errorEl.textContent = 'Xatolik yuz berdi.';
        }
      }
    });

    // Change password
    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('passwordError');
      var successEl = document.getElementById('passwordSuccess');
      errorEl.textContent = '';
      successEl.textContent = '';

      var oldP = document.getElementById('oldPassword').value;
      var newP = document.getElementById('newPassword').value;
      var confirmP = document.getElementById('confirmPassword').value;

      if (newP !== confirmP) {
        errorEl.textContent = 'Yangi parollar mos emas.';
        return;
      }

      try {
        await apiPost('/accounts/auth/change-password', { old_password: oldP, new_password: newP });
        successEl.textContent = 'Parol o\'zgartirildi!';
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      } catch (err) {
        if (err && err.json) {
          err.json().then(function(d) {
            errorEl.textContent = d.detail || JSON.stringify(d);
          }).catch(function() {
            errorEl.textContent = 'Xatolik yuz berdi.';
          });
        } else {
          errorEl.textContent = 'Xatolik yuz berdi.';
        }
      }
    });

    // Load orders
    async function loadOrders() {
      var container = document.getElementById('ordersList');
      var errorEl = document.getElementById('ordersError');
      errorEl.textContent = '';
      try {
        var orders = await apiGet('/orders/orders/my');
        if (!orders || orders.length === 0) {
          container.innerHTML = '<p style="color:var(--color-text-gray);font-size:14px;">Hali buyurtmalar yo\'q.</p>';
          return;
        }
        container.innerHTML = orders.map(function(o) {
          var statusClass = 'order-status--' + o.status;
          var itemsHtml = (o.items || []).map(function(i) {
            return i.quantity + 'x ' + (i.product_name || 'Mahsulot #' + i.product);
          }).join(', ');
          return '<div class="order-item">' +
            '<div class="order-header">' +
              '<span class="order-id">#' + o.id + '</span>' +
              '<span class="order-status ' + statusClass + '">' + o.status + '</span>' +
            '</div>' +
            '<div class="order-date">' + (o.created_at ? new Date(o.created_at).toLocaleDateString('uz-UZ') : '') + '</div>' +
            '<div class="order-products">' + itemsHtml + '</div>' +
            '<div class="order-total">' + (o.total_amount ? Number(o.total_amount).toLocaleString() + ' so\'m' : '') + '</div>' +
          '</div>';
        }).join('');
      } catch (err) {
        errorEl.textContent = 'Buyurtmalarni yuklab bo\'lmadi.';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', function () {
      clearTokens();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
