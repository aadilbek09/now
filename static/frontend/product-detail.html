<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahsulot — Restaran</title>
  <link rel="stylesheet" href="/static/frontend/globals.css" />
  <link rel="stylesheet" href="/static/frontend/menu.css" />
  <style>
    .pd-wrap { max-width: 720px; margin: 0 auto; padding: 90px 16px 40px; }
    .pd-back { display: inline-flex; align-items: center; gap: 6px; color: var(--color-primary); text-decoration: none; font-weight: 600; margin-bottom: 18px; }
    .pd-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 24px rgba(0,0,0,.06); }
    .pd-img { width: 100%; height: 300px; object-fit: cover; }
    .pd-body { padding: 22px; }
    .pd-cat { font-size: 12px; color: var(--color-primary); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .pd-name { font-size: 26px; font-weight: 700; margin: 6px 0 4px; }
    .pd-price { font-size: 22px; font-weight: 700; color: var(--color-primary); margin-bottom: 14px; }
    .pd-desc { font-size: 15px; line-height: 1.6; color: #555; }
    .pd-order { display: inline-block; margin-top: 18px; background: #25D366; color: #fff; padding: 12px 22px; border-radius: 10px; font-weight: 600; text-decoration: none; }
    .pd-section { margin-top: 28px; }
    .pd-section h3 { font-size: 18px; margin-bottom: 12px; }
    .pd-stars { display: flex; gap: 6px; font-size: 28px; cursor: pointer; }
    .pd-stars .star { color: #ddd; transition: color .15s; }
    .pd-stars .star.active, .pd-stars .star.hovered { color: #FFB400; }
    .pd-actions { display: flex; gap: 12px; margin-top: 14px; }
    .pd-like, .pd-dislike { flex: 1; padding: 10px; border: 1px solid var(--color-border); border-radius: 10px; background: var(--color-surface); cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .pd-like.active { color: #2ecc71; border-color: #2ecc71; }
    .pd-dislike.active { color: #e74c3c; border-color: #e74c3c; }
    .pd-comments { margin-top: 26px; }
    .pd-comment-item { padding: 12px 0; border-bottom: 1px solid var(--color-border); }
    .pd-comment-item p { margin: 2px 0; }
    .pd-input { width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; }
    .pd-submit { margin-top: 10px; background: var(--color-primary); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .pd-loading { text-align: center; padding: 60px 20px; color: #999; }
    .pd-order { cursor: pointer; text-align: center; }
    /* ===== Order Modal ===== */
    .om-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .om-overlay.open { display: flex; }
    .om-modal { background: var(--color-surface); border-radius: 16px; width: 100%; max-width: 420px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.3); max-height: 90vh; overflow-y: auto; }
    .om-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .om-sub { font-size: 13px; color: #888; margin-bottom: 18px; }
    .om-field { margin-bottom: 14px; }
    .om-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .om-input { width: 100%; padding: 11px 12px; border: 1px solid var(--color-border); border-radius: 10px; font-size: 14px; font-family: inherit; }
    .om-input:focus { outline: none; border-color: var(--color-primary); }
    .om-error { color: #e74c3c; font-size: 13px; margin-bottom: 10px; display: none; }
    .om-actions { display: flex; gap: 10px; margin-top: 8px; }
    .om-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
    .om-btn--submit { background: var(--color-primary); color: #fff; }
    .om-btn--cancel { background: #eee; color: #555; }
    .om-success { text-align: center; padding: 20px 0; }
    .om-success__icon { font-size: 48px; color: #2ecc71; }
    .om-success__title { font-size: 18px; font-weight: 700; margin: 10px 0 6px; }
    .om-success__text { font-size: 14px; color: #777; }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">Restaran</a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="header__nav" id="headerNav">
        <a href="/">Bosh sahifa</a>
        <a href="/menu/">Menu</a>
        <a href="/news/">Yangiliklar</a>
        <a href="/about/">Biz haqimizda</a>
        <a href="/contact/">Aloqa</a>
        <a href="/profile/" id="profileLink">Kabinet</a>
      </nav>
    </div>
  </header>

  <main class="pd-wrap">
    <a href="/menu/" class="pd-back">&larr; Menu ga qaytish</a>
    <div id="pdContent">
      <p class="pd-loading">Yuklanmoqda...</p>
    </div>
  </main>

  <!-- ===== Order Modal ===== -->
  <div class="om-overlay" id="orderModal">
    <div class="om-modal" id="orderModalInner">
      <div id="orderFormWrap">
        <div class="om-title">Buyurtma berish</div>
        <div class="om-sub" id="orderProductName"></div>
        <div class="om-error" id="orderError"></div>
        <div class="om-field">
          <label for="omName">Ism</label>
          <input class="om-input" id="omName" type="text" placeholder="Ismingiz" />
        </div>
        <div class="om-field">
          <label for="omLastName">Familiya</label>
          <input class="om-input" id="omLastName" type="text" placeholder="Familiyangiz" />
        </div>
        <div class="om-field">
          <label for="omPhone">Telefon raqam</label>
          <input class="om-input" id="omPhone" type="tel" placeholder="+998 9X XXX XX XX" />
        </div>
        <div class="om-field">
          <label for="omAddress">Manzil</label>
          <textarea class="om-input" id="omAddress" rows="2" placeholder="Yetkazib berish manzili"></textarea>
        </div>
        <div class="om-actions">
          <button class="om-btn om-btn--cancel" id="omCancel">Bekor qilish</button>
          <button class="om-btn om-btn--submit" id="omSubmit">Buyurtma berish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/frontend/api.js"></script>
  <script>
    var productId = null;

    function getQueryParam(name) {
      var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match ? decodeURIComponent(match[1]) : null;
    }

    function getProductIdFromUrl() {
      var id = getQueryParam('id') || getQueryParam('pk');
      if (id) return id;
      var m = window.location.pathname.match(/\/product\/(\d+)\/?/);
      return m ? m[1] : null;
    }

    function initNav() {
      var ham = document.getElementById('hamburger');
      var nav = document.getElementById('headerNav');
      if (!ham || !nav) return;
      ham.addEventListener('click', function() {
        nav.classList.toggle('open');
        ham.classList.toggle('open');
      });
    }

    function renderProduct(p) {
      var img = p.image_big || p.image || 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=600&q=80';
      var html =
        '<div class="pd-card">' +
          '<img class="pd-img" src="' + img + '" alt="' + (p.name || '') + '" />' +
          '<div class="pd-body">' +
            '<div class="pd-cat">' + (p.category_name || 'Mahsulot') + '</div>' +
            '<div class="pd-name">' + (p.name || '') + '</div>' +
            '<div class="pd-price">' + (p.price || 0) + ' so\'m</div>' +
            '<div class="pd-desc">' + (p.description || 'Ta\'rif mavjud emas.') + '</div>' +
            '<button class="pd-order" id="pdOrderBtn">Buyurtma berish</button>' +
          '</div>' +
        '</div>' +

        '<div class="pd-section">' +
          '<h3>Baholash</h3>' +
          '<div class="pd-stars" id="pdStars">' +
            '<span class="star" data-value="1">★</span>' +
            '<span class="star" data-value="2">★</span>' +
            '<span class="star" data-value="3">★</span>' +
            '<span class="star" data-value="4">★</span>' +
            '<span class="star" data-value="5">★</span>' +
          '</div>' +
          '<div class="pd-actions">' +
            '<button class="pd-like" id="pdLikeBtn"><span>&#128077;</span> <span id="pdLikeCount">0</span></button>' +
            '<button class="pd-dislike" id="pdDislikeBtn"><span>&#128078;</span> <span id="pdDislikeCount">0</span></button>' +
          '</div>' +
        '</div>' +

        '<div class="pd-comments">' +
          '<h3>Izohlar</h3>' +
          '<textarea class="pd-input" id="pdCommentInput" rows="3" placeholder="Izoh qoldiring..."></textarea>' +
          '<button class="pd-submit" id="pdCommentBtn">Yuborish</button>' +
          '<div id="pdComments" style="margin-top:16px;"></div>' +
        '</div>';

      document.getElementById('pdContent').innerHTML = html;
      initProductInteractions();
      initOrderModal(p);
      loadComments();
      loadRating();
      loadLikes();
    }

    function initProductInteractions() {
      var stars = document.querySelectorAll('#pdStars .star');
      stars.forEach(function(star) {
        star.addEventListener('click', function() {
          var val = parseInt(star.getAttribute('data-value'));
          stars.forEach(function(s) { s.className = 'star' + (parseInt(s.getAttribute('data-value')) <= val ? ' active' : ''); });
          apiPost('/menu/products/' + productId + '/rate', { score: val }).then(function() {
            loadRating();
          }).catch(function() { console.error('rate failed'); });
        });
        star.addEventListener('mouseenter', function() {
          var val = parseInt(star.getAttribute('data-value'));
          stars.forEach(function(s) { if (parseInt(s.getAttribute('data-value')) <= val) s.classList.add('hovered'); });
        });
        star.addEventListener('mouseleave', function() {
          stars.forEach(function(s) { s.classList.remove('hovered'); });
        });
      });

      var likeBtn = document.getElementById('pdLikeBtn');
      var dislikeBtn = document.getElementById('pdDislikeBtn');
      if (likeBtn) likeBtn.addEventListener('click', function() { toggleLike(true); });
      if (dislikeBtn) dislikeBtn.addEventListener('click', function() { toggleLike(false); });

      var commentBtn = document.getElementById('pdCommentBtn');
      var commentInput = document.getElementById('pdCommentInput');
      if (commentBtn) commentBtn.addEventListener('click', postComment);
      if (commentInput) commentInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postComment(); }
      });
    }

    function loadComments() {      var el = document.getElementById('pdComments');
      if (!el) return;
      el.innerHTML = '<p style="color:#999;font-size:13px;">Izohlar yuklanmoqda...</p>';
      apiGet('/menu/products/' + productId + '/comments').then(function(comments) {
        var arr = Array.isArray(comments) ? comments : [];
        if (!arr.length) { el.innerHTML = '<p style="color:#999;font-size:13px;">Hali izohlar yo\'q.</p>'; return; }
        el.innerHTML = arr.map(function(c) {
          return '<div class="pd-comment-item">' +
            '<p style="font-size:12px;color:#999;">' + (c.created_at ? new Date(c.created_at).toLocaleDateString() : '') + '</p>' +
            '<p>' + (c.text || '') + '</p>' +
          '</div>';
        }).join('');
      }).catch(function() {
        el.innerHTML = '<p style="color:#999;font-size:13px;">Izohlarni yuklashda xatolik.</p>';
      });
    }

    function postComment() {
      var input = document.getElementById('pdCommentInput');
      var text = input.value.trim();
      if (!text || !productId) return;
      apiPost('/menu/products/' + productId + '/comments', { text: text }).then(function(newComment) {
        var el = document.getElementById('pdComments');
        var noMsg = el.querySelector('p');
        if (noMsg && noMsg.textContent.indexOf('Hali izohlar') !== -1) el.innerHTML = '';
        var div = document.createElement('div');
        div.className = 'pd-comment-item';
        div.innerHTML = '<p style="font-size:12px;color:#999;">Hozirgina</p><p>' + (newComment.text || text) + '</p>';
        el.appendChild(div);
        input.value = '';
      }).catch(function() {
        alert('Izoh yuborishda xatolik.');
      });
    }

    function loadRating() {
      apiGet('/menu/products/' + productId + '/rating').then(function(data) {
        var avg = data.average_score || 0;
        var stars = document.querySelectorAll('#pdStars .star');
        stars.forEach(function(s) {
          s.className = 'star' + (parseInt(s.getAttribute('data-value')) <= Math.round(avg) ? ' active' : '');
        });
      }).catch(function() {});
    }

    function loadLikes() {
      apiGet('/menu/products/' + productId + '/rating').then(function(data) {
        var like = document.getElementById('pdLikeCount');
        var dislike = document.getElementById('pdDislikeCount');
        if (like) like.textContent = data.likes_count || 0;
        if (dislike) dislike.textContent = data.dislikes_count || 0;
      }).catch(function() {});
    }

    function toggleLike(isLike) {
      if (!productId) return;
      apiPost('/menu/products/' + productId + '/like', { is_like: isLike }).then(function(res) {
        var likeBtn = document.getElementById('pdLikeBtn');
        var dislikeBtn = document.getElementById('pdDislikeBtn');
        if (likeBtn) likeBtn.className = 'pd-like' + (isLike ? ' active' : '');
        if (dislikeBtn) dislikeBtn.className = 'pd-dislike' + (!isLike ? ' active' : '');
        if (res.likes_count != null && document.getElementById('pdLikeCount'))
          document.getElementById('pdLikeCount').textContent = res.likes_count;
        if (res.dislikes_count != null && document.getElementById('pdDislikeCount'))
          document.getElementById('pdDislikeCount').textContent = res.dislikes_count;
      }).catch(function() { console.error('like failed'); });
    }

    function initOrderModal(product) {
      var orderBtn = document.getElementById('pdOrderBtn');
      var modal = document.getElementById('orderModal');
      var cancelBtn = document.getElementById('omCancel');
      var submitBtn = document.getElementById('omSubmit');
      var errorEl = document.getElementById('orderError');
      var nameEl = document.getElementById('omName');
      var lastNameEl = document.getElementById('omLastName');
      var phoneEl = document.getElementById('omPhone');
      var addressEl = document.getElementById('omAddress');
      var productNameEl = document.getElementById('orderProductName');
      var formWrap = document.getElementById('orderFormWrap');
      var modalInner = document.getElementById('orderModalInner');

      if (productNameEl) {
        productNameEl.textContent = (product.name || '') + ' — ' + (product.price || 0) + ' so\'m';
      }

      function openModal() {
        if (errorEl) { errorEl.style.display = 'none'; errorEl.textContent = ''; }
        if (formWrap) formWrap.style.display = 'block';
        modal.classList.add('open');
      }

      function closeModal() {
        modal.classList.remove('open');
      }

      if (orderBtn) orderBtn.addEventListener('click', openModal);
      if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
      });

      if (submitBtn) submitBtn.addEventListener('click', function() {
        var name = nameEl.value.trim();
        var lastName = lastNameEl.value.trim();
        var phone = phoneEl.value.trim();
        var address = addressEl.value.trim();

        if (!name) { errorEl.textContent = 'Iltimos, ismingizni kiriting.'; errorEl.style.display = 'block'; return; }
        if (!phone) { errorEl.textContent = 'Iltimos, telefon raqamingizni kiriting.'; errorEl.style.display = 'block'; return; }
        if (!address) { errorEl.textContent = 'Iltimos, manzilni kiriting.'; errorEl.style.display = 'block'; return; }

        errorEl.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Yuborilmoqda...';

        apiPost('/orders/orders', {
          customer_name: name,
          customer_last_name: lastName,
          customer_phone: phone,
          address: address,
          channel: 'online',
          items: [{ product_id: productId, quantity: 1 }]
        }).then(function() {
          modalInner.innerHTML =
            '<div class="om-success">' +
              '<div class="om-success__icon">✓</div>' +
              '<div class="om-success__title">Buyurtmangiz qabul qilindi!</div>' +
              '<div class="om-success__text">Tez orada siz bilan bog\'lanamiz.</div>' +
            '</div>';
          setTimeout(closeModal, 2000);
        }).catch(function() {
          errorEl.textContent = 'Xatolik yuz berdi. Iltimos, qaytadan urinib ko\'ring.';
          errorEl.style.display = 'block';
        }).finally(function() {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Buyurtma berish';
        });
      });
    }

    function init() {
      initNav();
      productId = getProductIdFromUrl();
      if (!productId) {
        document.getElementById('pdContent').innerHTML = '<p class="pd-loading">Mahsulot topilmadi.</p>';
        return;
      }
      apiGet('/menu/products/' + productId).then(function(p) {
        renderProduct(p);
      }).catch(function() {
        document.getElementById('pdContent').innerHTML = '<p class="pd-loading">Mahsulotni yuklashda xatolik.</p>';
      });
    }

    init();
  </script>
</body>
</html>
