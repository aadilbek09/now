<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dizimnen o'tw — Restaran</title>
  <link rel="stylesheet" href="/static/frontend/globals.css />
  <style>
    .register-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-light);
      padding: 20px;
    }

    .register-card {
      background: var(--color-white);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .register-card__logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .register-card__sub {
      font-size: 14px;
      color: var(--color-text-gray);
      margin-bottom: 32px;
    }

    .register-card .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .register-card .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-dark);
      margin-bottom: 6px;
    }

    .register-card .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--color-border);
      border-radius: 10px;
      font-family: var(--font-family);
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .register-card .form-group input:focus {
      border-color: var(--color-primary);
    }

    .register-card__btn {
      width: 100%;
      padding: 14px;
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: 10px;
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 8px;
    }

    .register-card__btn:hover {
      background: var(--color-primary-dark);
    }

    .register-card__error {
      color: var(--color-primary);
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .register-card__error--visible {
      display: block;
    }

    .register-card__link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: var(--color-text-gray);
      transition: color 0.3s;
    }

    .register-card__link:hover {
      color: var(--color-text-dark);
    }
  </style>
</head>

<body>
  <div class="register-page">
    <div class="register-card">
      <div class="register-card__logo">Restaran</div>
      <p class="register-card__sub">JAna paydalaniwshi jaratiw</p>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Username" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Email" />
        </div>
        <div class="form-group">
          <label for="phone">Telefon</label>
          <input type="text" id="phone" placeholder="+998901234567" />
        </div>
        <div class="form-group">
          <label for="password">Parol</label>
          <input type="password" id="password" placeholder="Kamida 6 belgi" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="password2">Paroldi takrarlan</label>
          <input type="password" id="password2" placeholder="Parolni qayta kiriting" required />
        </div>
        <button type="submit" class="register-card__btn">Dizimnen o'tiw</button>
        <p class="register-card__error" id="registerError"></p>
      </form>

      <a href="/login/" class="register-card__link">&larr; Akauntiniz barma? Kiriw</a>
    </div>
  </div>

  <script src="/static/frontend/api.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var email = document.getElementById('email').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var password = document.getElementById('password').value;
      var password2 = document.getElementById('password2').value;
      var errorEl = document.getElementById('registerError');

      if (password !== password2) {
        errorEl.textContent = 'Parollir mas emas!';
        errorEl.classList.add('register-card__error--visible');
        return;
      }

      try {
        var result = await apiPost('/accounts/auth/register', {
          username: username,
          email: email,
          phone: phone,
          password: password,
          password2: password2
        });
        var msg = 'DI\'zimenen o\'tdinz!';
        if (result && result.username && result.username !== username) {
          msg += '\n\nSizdin username: ' + result.username + '\n(Esletpe: siz kiritgen username band edi, avtomatik qo\'yildi)';
        } else {
          msg += '\n\nUsername: ' + (result ? result.username : username);
        }
        alert(msg);
        try {
          var loginData = await apiPost('/accounts/auth/login', { username: username, password: password });
          setTokens(loginData.access, loginData.refresh);
          setUser(loginData.user);
          window.location.href = 'profile.html';
        } catch (e) {
          window.location.href = 'login.html';
        }
      } catch (err) {
        if (err && err.json) {
          err.json().then(function (data) {
            var msg = JSON.stringify(data);
            errorEl.textContent = msg;
            errorEl.classList.add('register-card__error--visible');
          }).catch(function () {
            errorEl.textContent = 'Di\'mnen o\'tiwde qatelik juz berdi';
            errorEl.classList.add('register-card__error--visible');
          });
        } else {
          errorEl.textContent = err.message || 'Di\'zimnen o\'tiwde qatelik juz berdi';
          errorEl.classList.add('register-card__error--visible');
        }
      }
    }
  </script>
</body>

</html>
